<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocolate</title>
    
    <style>
    /*sahnenin ekranda ortalanması için gerekli stil kodları*/
        body {
            margin: 0;
            overflow: hidden;
            background-color: #23140e;
            display: grid;
            place-items: center; 
            height: 100vh;
            width: 100vw;
        }
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url("images/giris_arka.jpeg"); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10; 
        }

        #start-btn {
            padding: 20px 50px;
            font-size: 40px;
            font-weight: bold;
            color: rgb(104, 64, 40);
            background-color: #ffffff;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        #start-btn:hover {
            background-color: #A66E4E;
            transform: scale(1.05); 
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <button id="start-btn">START</button>
    </div>
    <canvas id="chocolate"></canvas>
    <script>
        const canvas = document.getElementById("chocolate");
        const context = canvas.getContext("2d");

        // Arka plan tasarımı ve oyuncu için gerekli değişkenlerin tanımlanıp dosya yollarının atanması
        var bg_light = new Image();
        var bg_dark = new Image();
        var turner_light = new Image();     
        var turner_dark = new Image();     
        var player_img_r = new Image();  
        var player_img_l = new Image();  
        var finishImg = new Image(); 
        var ghost_img_r = new Image();
        var ghost_img_l = new Image();

        // oyun müzik dosyalarının tanımlanması
        var bg_music = new Audio("audio_files/arka.mp3");
        bg_music.loop = true;
        bg_music.volume = 0.2;

        var jump_sound = new Audio("audio_files/ziplama.mp3");
        jump_sound.volume = 0.7;

        var lose_sound = new Audio("audio_files/kaybetme.mp3");
        lose_sound.volume = 0.8;

        const BASE_WIDTH = 1600;
        const BASE_HEIGHT = 900;

        var start = {x: 30, y: 350};

        let scale = 1;
        // oyuncu nesnesinin özellikleri
        var player = {
            x: start.x,
            y: start.y,
            width: 50,
            height: 50,
            vx: 9,
            vy: 0, 
            onGround: false,
            facing_right: true
        };

        // hayalet nesnesinin özellikleri
        var ghost = {
            x: 1320,
            y: 825,
            width: 50,
            height: 50,
            path_index: 0,
            g_facing_right: true
        }

        // farklı boyuttaki ekranlar için oyun ekranını sabit tutmak için fonksiyon
        function resizeCanvas() {
            const padding = 0.9;

            const scaleX = (window.innerWidth * padding) / BASE_WIDTH;
            const scaleY = (window.innerHeight * padding) / BASE_HEIGHT;
            scale = Math.min(scaleX, scaleY); 

            canvas.width = BASE_WIDTH * scale;
            canvas.height = BASE_HEIGHT * scale;
        }

        window.addEventListener('resize', resizeCanvas);

        // Parkur için gerekli dikdörtgenlerin koordinat, boyut ve renk bilgilerini tutmak için dizi
        var rects = [
            {x: 0, y: 400, width: 225, height: 500, color: "#8c5b3f"},
            {x: 375, y: 300, width: 200, height: 75, color: "#8c5b3f"},
            {x: 350, y: 600, width: 400, height: 75, color: "#8c5b3f"},
            {x: 825, y: 475, width: 300, height: 75, color: "#8c5b3f"},
            {x: 1175, y: 670, width: 225, height: 80, color: "#8c5b3f"},
            {x: 1175, y: 750, width: 80, height: 150, color: "#8c5b3f"},
            {x: 1520, y: 740, width: 80, height: 80, color: "#8c5b3f"},
            {x: 1440, y: 820, width: 160, height: 80, color: "#8c5b3f"},
            {x: 1255, y: 885, width: 200, height: 15, color: "#8c5b3f"}
        ];

        // Arka plan deseni için olan resimlerin koordinat, boyut ve dosya yolu bilgilerini tutmak için dizi
        var turners = [
            {x: 300, y: 250, width: 75, height: 150},
            {x: 1175, y: 150, width: 75, height: 150},
            {x: 700, y: 650, width: 75, height: 150}
        ];

        // oyuncunun ulaşması gereken bitiş nesnesi
        var finish = {x: 1270, y: 775, width: 100, height: 100};

        var game_part = 1;
        
        var time_left_ms = 10000;

        const gravity = 3;

        // 2. partta geri dönecek hayaletlerin listesi
        var ghost_list = [];
        // hayaletlerin karakterin izlediği rotayı takip edebilmesi için koordinatların kaydedileceği liste
        var recorded_path = [
            {x: start.x, y: start.y, facing_right: true}
        ];

        var right = false;
        var left = false;
        var up = false;

        var music_started = false;
        var game_started = false;
        var is_entrance = true;

        const start_screen = document.getElementById("start-screen");
        const start_btn = document.getElementById("start-btn");

        start_btn.addEventListener("click", function() {
            start_screen.style.display = "none"; 
            is_entrance = false; 
            
            if(!music_started){
                bg_music.play();
                music_started = true;
            }
        });

        window.addEventListener("keydown", function(key){
            if(is_entrance) return;

            game_started = true;

            if(key.code === "KeyD" || key.code === "ArrowRight"){
                right = true;
                player.facing_right = true;
            }if(key.code === "KeyA" || key.code === "ArrowLeft"){
                left = true;
                player.facing_right = false;
            }if(key.code === "KeyW" || key.code === "ArrowUp")
                up = true;
        });

        window.addEventListener("keyup", function(key){
            if(key.code === "KeyD" || key.code === "ArrowRight")
                right = false;
            if(key.code === "KeyA" || key.code === "ArrowLeft")
                left = false;
            if(key.code === "KeyW" || key.code === "ArrowUp")
                up = false;
        });

        // İki nesne arasında temas kontrolü
        function checkCollision(p, r) {
            return p.x < r.x + r.width &&
                p.x + p.width > r.x &&
                p.y < r.y + r.height &&
                p.y + p.height > r.y;
        }

        // oyuncunun x ve y eksenlerinde haraketlerinin mekaniği
        function move(delta = 1) {
            if (right) (player.x + player.width >= BASE_WIDTH) ? player.x = BASE_WIDTH - player.width : player.x += player.vx * delta;
            if (left)  (player.x <= 0) ? player.x = 0 : player.x -= player.vx * delta;

            rects.forEach(function(rect) {
                if (checkCollision(player, rect)) {
                    // Eğer sağa doğru gidilerken duvar içine girilirse o kenarına hizala
                    if (right) { 
                        player.x = rect.x - player.width;
                    } 
                    // Eğer sola doğru gidilerken duvar içine girilirse o kenarına hizala
                    else if (left) { 
                        player.x = rect.x + rect.width;
                    }
                }
            });

            player.vy += gravity * delta;
            player.y += player.vy * delta;
            player.onGround = false;

            rects.forEach(function(rect) {
                if (checkCollision(player, rect)) {
                    // Aşağı düşerken duvar yüzeyine gelirse dur, yerde olduğunu değişkene bildir
                    if (player.vy > 0) { 
                        player.y = rect.y - player.height;
                        player.vy = 0;                    
                        player.onGround = true;          
                    } 
                    // Zıplarken duvarın alt kenarına çarpılırsa hızı sıfırla
                    else if (player.vy < 0) { 
                        player.y = rect.y + rect.height;  
                        player.vy = 0;                  
                    }
                }
            });

            // oyuncu düşerek ekranın dışına çıkarsa oyunu sıfırla
            if(player.y >= BASE_HEIGHT) {
                resetGame();
            }

            // oyuncu sadece yerdeyken zıplama tuşuna basılırsa zıplasın
            if (up && player.onGround) {
                jump_sound.currentTime = 0;
                jump_sound.play();

                player.vy = -30;
                player.onGround = false;
            }
        }

        // oyunu başlangıç konumuna getirme
        function resetGame(){
            lose_sound.currentTime = 0;
            lose_sound.play();

            game_part = 1;
            time_left_ms = 10000;
            recorded_path = [{x: start.x, y: start.y, facing_right: true}];
            ghost_list = [];
            player.x = start.x;
            player.y = start.y;
            player.vx = 9;
            player.vy = 0;
            player.facing_right = true;
            ghost_push_time = 0;
            game_started = false;
        }

        // 1. ve 2. part için oyuncunun tamamlama kontrolü
        function finishControl(){
            /* 1. part tamamlandıysa hayaletlerin takip edeceği yol için karakterin takip ettiği yol ters çevrilir, 
            part 1 tamamlnadığı anda ilk hayalet hayalet listesine eklenir. 
            part 1 içindeyken bitiş nesnesine dokunulmadığı her an koordinatlar kaydedilir.
            */
            if(game_part === 1){
                if(checkCollision(player, finish)){
                game_part = 2;
                recorded_path.reverse();

                let first_coord = recorded_path[0];
                ghost_list.push({
                    x: first_coord.x,
                    y: first_coord.y,
                    width: 50, 
                    height: 50,
                    path_index: 0,
                    g_facing_right: first_coord.facing_right
                })

                player.x = start.x;
                player.y = start.y;
                player.vy = 0;
                }else{
                    if (game_started) {
                        recorded_path.push({x: player.x, y: player.y, facing_right: player.facing_right});
                    }
                    /* debug için
                    console.log(recorded_path[recorded_path.length-1].x + " " + recorded_path[recorded_path.length-1].y);
                    */
                }
            }
            
            /*2. part tamamlandığında kazanma yazısı gösterilir ve oyun sıfırlanır.*/
            else if(game_part === 2){
                if(checkCollision(player, finish)){
                    console.log("game over you WIN");
                    resetGame();
                }
            }            
        }

        // oyun ekranının bütün resimler yükledikten sonra çizilmesi için kontrol fonksiyonu
        var loadedImages = 0;
        var totalImages = 9;
        var is_loop_running = false;
        function imageLoaded() {
            loadedImages++;
            if (loadedImages === totalImages && !is_loop_running) {
                is_loop_running = true;
                resizeCanvas(); // Tüm resimler yüklenince çizime başla
                requestAnimationFrame(gameLoop);
            }
        }

        bg_light.onload = imageLoaded;
        bg_dark.onload = imageLoaded;
        player_img_r.onload = imageLoaded;
        player_img_l.onload = imageLoaded;
        turner_light.onload = imageLoaded;
        turner_dark.onload = imageLoaded;
        finishImg.onload = imageLoaded;
        ghost_img_r.onload = imageLoaded;
        ghost_img_l.onload = imageLoaded;
        
        bg_light.src = "images/acik_arka.jpeg"
        bg_dark.src = "images/koyu_arka.png"
        player_img_r.src = "images/karakter.png";
        player_img_l.src = "images/karakter_sol.png";
        turner_light.src = "images/donen_acik.jpeg";
        turner_dark.src = "images/donen_koyu.jpeg";
        finishImg.src = "images/bitis.png";
        ghost_img_r.src = "images/hayalet.png";
        ghost_img_l.src = "images/hayalet_sol.png";

        let angle = 0;
        let time = 0;
        function draw(delta = 1){
            // farklı ekranlarda aynı ebatta gözükmesi için ekranın ölçeklendirilmesi
            context.setTransform(scale, 0, 0, scale, 0, 0);
            context.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

            let current_bg_img = (game_part === 1) ? bg_light : bg_dark;
            context.drawImage(current_bg_img, 0, 0, BASE_WIDTH, BASE_HEIGHT);

            let current_turner = (game_part === 1) ? turner_light : turner_dark;
            // Arka plandaki çikolataların merkez noktalarından dönmeleri için yazılan kısım
            turners.forEach(function(turn){
                context.save();
                context.translate(turn.x + turn.width/2, turn.y + turn.height/2);
                context.rotate(angle);
                context.drawImage(current_turner, -turn.width/2, -turn.height/2, turn.width, turn.height);
                context.restore();
            });

            // parkurun çizilmesi
            rects.forEach(function(rect) {
                context.fillStyle = (game_part === 1) ? "#8c5b3f" : "#845F4C";
                context.fillRect(rect.x, rect.y, rect.width, rect.height);
            });

            // bitiş nesnesinin zoom efektiyle çizilmesi
            const scaleFinish = 1 + Math.abs(Math.sin(time)) * 0.35; 
            context.save();
            context.translate(finish.x + finish.width/2, finish.y + finish.height/2);
            context.scale(scaleFinish, scaleFinish);
            context.drawImage(finishImg, -finish.width/2, -finish.height/2, finish.width, finish.height);
            context.restore();
            time += 0.05 * delta;

            if(game_part === 2){
                ghost_list.forEach(function(ghost){
                    let current_ghost_img = (ghost.g_facing_right) ? ghost_img_l : ghost_img_r;
                    context.drawImage(current_ghost_img, ghost.x, ghost.y, ghost.width, ghost.height);
                });
            }

            // oyunucunun en üstte kalması için en sonda çizilmesi
            let current_player_img = (player.facing_right) ? player_img_r : player_img_l;
            context.drawImage(current_player_img, player.x, player.y, player.width, player.height);
            
            let seconds = Math.floor(time_left_ms / 1000);
            // Milisaniyeyi 2 haneli göstermek için 10a bölme
            let milliseconds = Math.floor((time_left_ms % 1000) / 10); 

            // Tek haneye düşüldüğünde başına 0 ekleme
            let secStr = seconds < 10 ? "0" + seconds : seconds;
            let milStr = milliseconds < 10 ? "0" + milliseconds : milliseconds;

            // süre çizimi
            context.fillStyle = (game_part === 1) ? "white" : "gray";
            context.font = "bold 30px Arial";
            context.textAlign = "right"; 
            context.fillText(secStr + ":" + milStr, BASE_WIDTH - 30, 60);

            // oyun partına göre dönen nesnelerin yönünün ayarlanması
            if(game_part === 1)
                angle += 0.025 * delta;
            else if(game_part === 2)
                angle -= 0.025 *delta;
        }

        // 1. part için güncelleme fonksiyonu
        function update1(delta){
            move(delta);
            finishControl();
        }

        // 2. part için güncelleme fonksiyonu
        var ghost_push_time = 0;
        function update2(delta){
            move(delta);

            // 2 saniyede bir hayalet oluşturulması
            ghost_push_time++;
            if (ghost_push_time % 120 === 0) {
                ghost_list.push({
                    x: 0, y: 0, 
                    width: 50, height: 50, 
                    path_index: 0,
                    g_facing_right: true
                });
            }

            if(game_part !== 2) return;

            // hayalet listesindeki hayaletlerin recorded_path'i takip etmesi
            for(let i = ghost_list.length - 1; i >= 0; i--){
                let gh = ghost_list[i];

                if(gh.path_index < recorded_path.length){
                    var coordinat = recorded_path[gh.path_index];
                    gh.x = coordinat.x;
                    gh.y = coordinat.y;
                    gh.path_index++;
                    gh.g_facing_right = coordinat.facing_right;
                }else{
                    ghost_list.splice(i, 1);
                    continue;
                }

                // oyuncu hayaletle çarpıştıysa oyunu sıfırla
                if(checkCollision(player, gh)){
                    resetGame();
                    return;
                }
            }

            finishControl();
        }

        // oyunun genel döngüsü
        let lastTime = null;
        function gameLoop(timestamp){
            if(lastTime === null) lastTime = timestamp;

            let dt = timestamp - lastTime;

            const delta = Math.min(dt / (1000/60), 3);
            lastTime = timestamp;

            if (game_started && game_part === 1) {
                time_left_ms -= dt;
                
                if (time_left_ms <= 0) {
                    time_left_ms = 0;
                    resetGame();
                }
            }

            if(game_part === 1) update1(delta);
            else if(game_part === 2) update2(delta);

            draw(delta);
            
            requestAnimationFrame(gameLoop);
        }

    </script>
</body>
</html>
