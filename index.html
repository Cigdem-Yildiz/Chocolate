<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocolate</title>
    
    <style>
    /*sahnenin ekranda ortalanması için gerekli stil kodları*/
        body {
            margin: 0;
            overflow: hidden;
            background-color: #23140e;
            display: grid;
            place-items: center; 
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>
    <canvas id="chocolate"></canvas>
    <script>
        const canvas = document.getElementById("chocolate");
        const context = canvas.getContext("2d");

        // Arka plan tasarımı ve oyuncu için gerekli değişkenlerin tanımlanıp dosya yollarının atanması
        var bg = new Image();
        var turner = new Image();     
        var playerImg = new Image();  
        var finishImg = new Image(); 
        var ghost_img = new Image();

        const BASE_WIDTH = 1600;
        const BASE_HEIGHT = 900;

        var start = {x: 30, y: 350};

        let scale = 1;
        var player = {
            x: start.x,
            y: start.y,
            width: 50,
            height: 50,
            vx: 10,
            vy: 0, 
            onGround: false
        };
        var ghost = {
            x: 1320,
            y: 825,
            width: 50,
            height: 50,
            path_index: 0
        }

        function resizeCanvas() {
            const padding = 0.9;

            const scaleX = (window.innerWidth * padding) / BASE_WIDTH;
            const scaleY = (window.innerHeight * padding) / BASE_HEIGHT;
            scale = Math.min(scaleX, scaleY); 

            canvas.width = BASE_WIDTH * scale;
            canvas.height = BASE_HEIGHT * scale;

            draw();
        }

        window.addEventListener('resize', resizeCanvas);

        // Parkur için gerekli dikdörtgenlerin koordinat, boyut ve renk bilgilerini tutmak için dizi
        var rects = [
            {x: 0, y: 400, width: 225, height: 500, color: "#8c5b3f"},
            {x: 375, y: 300, width: 200, height: 75, color: "#8c5b3f"},
            {x: 350, y: 600, width: 400, height: 75, color: "#8c5b3f"},
            {x: 825, y: 475, width: 300, height: 75, color: "#8c5b3f"},
            {x: 1175, y: 670, width: 225, height: 80, color: "#8c5b3f"},
            {x: 1175, y: 750, width: 80, height: 150, color: "#8c5b3f"},
            {x: 1520, y: 740, width: 80, height: 80, color: "#8c5b3f"},
            {x: 1440, y: 820, width: 160, height: 80, color: "#8c5b3f"},
            {x: 1255, y: 885, width: 200, height: 15, color: "#8c5b3f"}
        ];

        // Arka plan deseni için olan resimlerin koordinat, boyut ve dosya yolu bilgilerini tutmak için dizi
        var turners = [
            {x: 300, y: 250, width: 75, height: 150},
            {x: 1175, y: 150, width: 75, height: 150},
            {x: 700, y: 650, width: 75, height: 150}
        ];
        
        var finish = {x: 1270, y: 775, width: 100, height: 100};

        var game_part = 1;
        const gravity = 3;

        var ghost_list = [];
        var recorded_path = [
            {x: player.x, y: player.y}
        ];

        var right = false;
        var left = false;
        var up = false;

        window.addEventListener("keydown", function(key){
            if(key.code === "KeyD" || key.code === "ArrowRight")
                right = true;
            if(key.code === "KeyA" || key.code === "ArrowLeft")
                left = true;
            if(key.code === "KeyW" || key.code === "ArrowUp")
                up = true;
        });

        window.addEventListener("keyup", function(key){
            if(key.code === "KeyD" || key.code === "ArrowRight")
                right = false;
            if(key.code === "KeyA" || key.code === "ArrowLeft")
                left = false;
            if(key.code === "KeyW" || key.code === "ArrowUp")
                up = false;
        });

        // İki nesne arasında temas kontrolü
        function checkCollision(p, r) {
            return p.x < r.x + r.width &&
                p.x + p.width > r.x &&
                p.y < r.y + r.height &&
                p.y + p.height > r.y;
        }

        function move() {
            if (right) (player.x + player.width === BASE_WIDTH) ? player.x = BASE_WIDTH - player.width : player.x += player.vx;
            if (left) (player.x === 0) ? player.x = 0 : player.x -= player.vx;

            rects.forEach(function(rect) {
                if (checkCollision(player, rect)) {
                    // Eğer sağa doğru gidilerken duvar içine girilirse o kenarına hizala
                    if (right) { 
                        player.x = rect.x - player.width;
                    } 
                    // Eğer sola doğru gidilerken duvar içine girilirse o kenarına hizala
                    else if (left) { 
                        player.x = rect.x + rect.width;
                    }
                }
            });

            player.vy += gravity;
            player.y += player.vy;
            player.onGround = false;

            rects.forEach(function(rect) {
                if (checkCollision(player, rect)) {
                    // Aşağı düşerken duvar yüzeyine gelirse dur, yerde olduğunu değişkene bildir
                    if (player.vy > 0) { 
                        player.y = rect.y - player.height;
                        player.vy = 0;                    
                        player.onGround = true;          
                    } 
                    // Zıplarken duvarın alt kenarına çarpılırsa hızı sıfırla
                    else if (player.vy < 0) { 
                        player.y = rect.y + rect.height;  
                        player.vy = 0;                  
                    }
                }
            });

            if(player.y >= BASE_HEIGHT) {
                resetGame();
            }

            if (up && player.onGround) {
                player.vy = -30;
                player.onGround = false;
            }
        }

        function resetGame(){
            game_part = 1;
            recorded_path = [];
            ghost_list = [];
            player.x = start.x;
            player.y = start.y;
            player.vx = 10;
            player.vy = 0;
        }

        function finishControl(){
            if(checkCollision(player, finish)){
                game_part = 2;
                recorded_path.reverse();

                let first_coord = recorded_path[0];
                ghost_list.push({
                    x: first_coord.x,
                    y: first_coord.y,
                    width: 50, 
                    height: 50,
                    path_index: 0
                })

                player.x = start.x;
                player.y = start.y;
                player.vy = 0;
                // console.log("1. part bitş");
            }else{
                recorded_path.push({x: player.x, y: player.y});
                /* debug için
                console.log(recorded_path[recorded_path.length-1].x + " " + recorded_path[recorded_path.length-1].y);
                */
            }
        }

        var loadedImages = 0;
        var totalImages = 4;

        function imageLoaded() {
            loadedImages++;
            if (loadedImages === totalImages) {
                resizeCanvas(); // Tüm resimler yüklenince çizime başla
                gameLoop();
            }
        }

        bg.onload = imageLoaded;
        playerImg.onload = imageLoaded;
        turner.onload = imageLoaded;
        finishImg.onload = imageLoaded;
        
        bg.src = "images/acik_arka.jpeg"
        playerImg.src = "images/karakter.png";
        turner.src = "images/donen_acik.jpeg";
        finishImg.src = "images/bitis.png";
        ghost_img.src = "images/hayalet.png";

        let angle = 0;
        let time = 0;
        function draw(){
            context.setTransform(scale, 0, 0, scale, 0, 0);
            context.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

            context.drawImage(bg, 0, 0, BASE_WIDTH, BASE_HEIGHT);

            // Arka plandaki çikolataların merkez noktalarından dönmeleri için yazılan kısım
            turners.forEach(function(turn){
                context.save();
                context.translate(turn.x + turn.width/2, turn.y + turn.height/2);
                context.rotate(angle);
                context.drawImage(turner, -turn.width/2, -turn.height/2, turn.width, turn.height);
                context.restore();
            });

            rects.forEach(function(rect) {
                context.fillStyle = rect.color;
                context.fillRect(rect.x, rect.y, rect.width, rect.height);
            });

            const scaleFinish = 1 + Math.abs(Math.sin(time)) * 0.35; 
            context.save();
            context.translate(finish.x + finish.width/2, finish.y + finish.height/2);
            context.scale(scaleFinish, scaleFinish);
            context.drawImage(finishImg, -finish.width/2, -finish.height/2, finish.width, finish.height);
            context.restore();
            time += 0.05;

            if(game_part === 2){
                ghost_list.forEach(function(ghost){
                    context.drawImage(ghost_img, ghost.x, ghost.y, ghost.width, ghost.height);
                });
            }

            context.drawImage(playerImg, player.x, player.y, player.width, player.height);

            angle += 0.025;
        }

        function update1(){
            move();
            finishControl();
        }

        function update2(){
            move();

            if(game_part !== 2) return;

            for(let i = ghost_list.length - 1; i >= 0; i--){
                gh = ghost_list[0];

                if(gh.path_index < recorded_path.length){
                    var coordinat = recorded_path[gh.path_index];
                    gh.x = coordinat.x;
                    gh.y = coordinat.y;
                    gh.path_index++;
                }else{
                    ghost_list.splice(i, 1);
                    console.log("yol sonu");
                    continue;
                }

                if(checkCollision(player, gh)){
                    resetGame();
                    return;
                }
            }
        }

        function gameLoop(){
            if(game_part === 1) update1();
            else if(game_part === 2) update2();

            draw();
        
            requestAnimationFrame(gameLoop);
        }

    </script>
</body>
</html>
